name: "Bar Assistant"
version: "5.15.4.15.2"
description: "Meilisearch + Bar Assistant API + Salt Rim in a single add-on"
url: "https://github.com/karlomikus/bar-assistant"
slug: "bar-assistant"
# Pre-built multi-arch image published to GHCR by .github/workflows/publish.yaml.
# One manifest carries both amd64 and arm64, so no {arch} placeholder is needed --
# Supervisor appends ":<version>" and the registry resolves the host's arch, e.g.
# ghcr.io/dvvarf/ha-bar-assistant-app:5.15.4.15.0 -- instead of building locally
# on the user's device. Bumping `version:` (below) to a tag that exists in GHCR is
# what surfaces "update available" in Home Assistant.
image: "ghcr.io/dvvarf/ha-bar-assistant-app"
init: false
arch:
  - amd64
  - aarch64
webui: "http://[HOST]:[PORT:2118]"
panel_icon: "mdi:glass-cocktail"
# Application-level health detection is done via the Dockerfile HEALTHCHECK, NOT
# a `watchdog:` key here: the HA add-on linter rejects `watchdog` as obsolete
# ("Use the native Docker HEALTHCHECK directive instead"). Modern Supervisor
# drives its add-on watchdog off the container's HEALTHCHECK status, so the
# HEALTHCHECK gives both the health indicator in the UI and the auto-restart
# (when the user's Watchdog toggle is on) -- and it probes all three inner
# services, including Meilisearch. See the HEALTHCHECK in the Dockerfile.
ports:
  2118/tcp: 2118
ports_description:
  2118/tcp: "Web UI (/), Bar Assistant API (/bar/), Meilisearch (/search/)"
options:
  MEILI_MASTER_KEY: "please-change-me-min-16-bytes"
  API_URL: "http://homeassistant.local:2118/bar"
  MEILISEARCH_URL: "http://homeassistant.local:2118/search"
  ALLOW_REGISTRATION: true
  # ai/redis are nested groups. They MUST appear here (even empty) or Supervisor
  # rejects the config -- optional nested dicts that are omitted fail validation
  # (home-assistant/supervisor#4606). Empty = nothing configured; ba-prep then
  # writes none of their keys, so AI stays off and cache/session stay on file.
  ai: {}
  redis: {}
schema:
  MEILI_MASTER_KEY: "password"
  API_URL: "url"
  MEILISEARCH_URL: "url"
  ALLOW_REGISTRATION: "bool"
  # --- General (all optional; hidden under "show unused optional" until set) ---
  APP_NAME: "str?"
  LOG_LEVEL: "list(debug|info|notice|warning|error|critical|alert|emergency)?"
  ENABLE_PASSWORD_LOGIN: "bool?"
  ENABLE_FEEDS: "bool?"
  SESSION_LIFETIME: "int?"
  # --- AI / LLM (single provider; one generic key/url routed to the chosen one) ---
  ai:
    provider: "list(openai|anthropic|ollama|mistral|groq|xai|gemini|deepseek|openrouter|elevenlabs|voyageai)?"
    model: "str?"
    api_key: "password?"
    base_url: "url?"
    timeout: "int?"
    image_provider: "list(openai|anthropic|ollama|mistral|groq|xai|gemini|deepseek|openrouter|elevenlabs|voyageai)?"
    image_model: "str?"
    mcp_server: "bool?"
  # --- Redis (external server; this image ships none) ---
  redis:
    host: "str?"
    port: "port?"
    password: "password?"
