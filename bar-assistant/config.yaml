name: "Bar Assistant"
version: "5.15.4.15.0"
description: "Meilisearch + Bar Assistant API + Salt Rim in a single add-on"
url: "https://github.com/karlomikus/bar-assistant"
slug: "bar-assistant"
# Pre-built multi-arch image published to GHCR by .github/workflows/publish.yaml.
# Supervisor substitutes {arch} and appends ":<version>", pulling e.g.
# ghcr.io/dvvarf/ha-addon-bar-assistant-aarch64:5.15.4.15.0 instead of building
# locally on the user's device. Bumping `version:` (below) to a tag that exists
# in GHCR is what surfaces "update available" in Home Assistant.
image: "ghcr.io/dvvarf/ha-addon-bar-assistant-{arch}"
init: false
arch:
  - amd64
  - aarch64
startup: application
boot: auto
webui: "http://[HOST]:[PORT:2118]"
panel_icon: "mdi:glass-cocktail"
ports:
  2118/tcp: 2118
ports_description:
  2118/tcp: "Web UI (/), Bar Assistant API (/bar/), Meilisearch (/search/)"
options:
  MEILI_MASTER_KEY: "please-change-me-min-16-bytes"
  API_URL: "http://homeassistant.local:2118/bar"
  MEILISEARCH_URL: "http://homeassistant.local:2118/search"
  ALLOW_REGISTRATION: true
schema:
  MEILI_MASTER_KEY: "password"
  API_URL: "url"
  MEILISEARCH_URL: "url"
  ALLOW_REGISTRATION: "bool"
