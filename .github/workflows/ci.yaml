name: CI (build + smoke test)

# Builds the image and boots it through tests/smoke.sh. Does NOT push anything --
# this is the gate that makes dependency-update PRs (Renovate) safe to merge.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.arch }} build + smoke
    # Each arch builds on a runner of its own architecture, so the build is
    # always native -- no QEMU emulation. arm64 uses GitHub's free hosted ARM
    # runner (public repos), which is far faster than the old emulated build.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both runner images are version-pinned (not `-latest`) so the build
          # environment only moves on a reviewed Renovate PR. The smoke test is
          # a hard gate on both arches: each builds natively (no QEMU), so an
          # arm64 failure is a real failure, not emulation flakiness.
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: aarch64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      # No "Set up QEMU" step: each leg builds its own native platform on a
      # matching runner, so cross-arch emulation is never needed.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (${{ matrix.platform }})
        uses: docker/build-push-action@v7
        with:
          context: ./bar-assistant
          platforms: ${{ matrix.platform }}
          tags: ha-bar-assistant:test
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Smoke test
        env:
          IMAGE: ha-bar-assistant:test
          PLATFORM: ${{ matrix.platform }}
        run: bash bar-assistant/tests/smoke.sh
