name: CI (build + smoke test)

# Builds the image and boots it through tests/smoke.sh. Does NOT push anything --
# this is the gate that makes dependency-update PRs (Renovate) safe to merge.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.arch }} build + smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            # amd64 runs natively on the runner -> the hard gate.
            smoke_required: true
          - arch: aarch64
            platform: linux/arm64
            # aarch64 boots under QEMU emulation (slow/occasionally flaky); the
            # build succeeding is the hard requirement, the boot is best-effort.
            # CLAUDE.md already proved aarch64 boots natively on real hardware.
            smoke_required: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: ./bar-assistant
          platforms: ${{ matrix.platform }}
          tags: ha-bar-assistant:test
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Smoke test
        id: smoke
        continue-on-error: ${{ !matrix.smoke_required }}
        env:
          IMAGE: ha-bar-assistant:test
          PLATFORM: ${{ matrix.platform }}
        run: bash bar-assistant/tests/smoke.sh

      - name: Note emulated smoke result
        if: ${{ !matrix.smoke_required && steps.smoke.outcome == 'failure' }}
        run: echo "::warning::aarch64 smoke test failed under QEMU emulation (non-blocking); build succeeded."
