name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  addon-linter:
    name: Add-on config linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Lint add-on config
        uses: frenck/action-addon-linter@v2
        with:
          path: "./bar-assistant"

  version-sync:
    name: Version coupling guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check version / LABEL / upstream tags agree
        run: bash scripts/check-version-sync.sh

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: bar-assistant/Dockerfile
          # Heredocs + intentional root user are by design here (see CLAUDE.md);
          # keep lint advisory rather than failing the build on style rules.
          no-fail: true

  renovate-config:
    name: Renovate config validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "latest"
      # Renovate's published JSON schema is permissive (e.g. it would not flag
      # the `dockerfile.managers` typo that halted PRs in #12); only Renovate's
      # own validator catches invalid config options. `--strict` also fails on
      # warnings. Run from the repo root so renovate.json is checked as
      # repository config.
      - name: Validate renovate.json
        run: npx --yes --package renovate -- renovate-config-validator --strict
