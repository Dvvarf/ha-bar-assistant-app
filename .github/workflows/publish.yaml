name: Publish to GHCR

# Builds both architectures and pushes a single multi-arch manifest that Home
# Assistant pulls (ghcr.io/dvvarf/ha-bar-assistant-app). buildx attaches both
# linux/amd64 and linux/arm64 to one manifest, so config.yaml's `image:` needs
# no {arch} placeholder -- the registry resolves the right arch at pull time.
# This matches the current home-assistant/addons-example ("apps") template.
#
# Trigger: a pushed git tag matching the 5-part version, or a published Release.
#   git tag 5.15.4.15.0 && git push origin 5.15.4.15.0

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+.[0-9]+.[0-9]+"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (must equal config.yaml version)"
        required: true

# Dedupe runs for the same version: a tag push and a Release published from that
# same tag would otherwise both fire and re-push identical :version + :latest
# images. cancel-in-progress:false lets the first run finish rather than killing a
# half-done push to GHCR.
concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: dvvarf

jobs:
  guard:
    name: Version guard
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Version coupling guard
        run: bash scripts/check-version-sync.sh
      - name: Resolve and verify version
        id: v
        run: |
          set -euo pipefail
          cfg_ver="$(grep -E '^version:' bar-assistant/config.yaml | head -1 \
            | sed -E 's/^version:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/')"
          case "${{ github.event_name }}" in
            push)              ref_ver="${GITHUB_REF_NAME}" ;;
            release)           ref_ver="${GITHUB_REF_NAME#v}" ;;
            workflow_dispatch) ref_ver="${{ github.event.inputs.version }}" ;;
          esac
          echo "config.yaml=$cfg_ver  trigger=$ref_ver"
          if [ "$cfg_ver" != "$ref_ver" ]; then
            echo "::error::Trigger version ($ref_ver) != config.yaml version ($cfg_ver)"; exit 1
          fi
          echo "version=$cfg_ver" >> "$GITHUB_OUTPUT"

  publish:
    name: Build + push multi-arch manifest
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch manifest
        uses: docker/build-push-action@v6
        with:
          context: ./bar-assistant
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/ha-bar-assistant-app:${{ needs.guard.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/ha-bar-assistant-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
