name: Publish to GHCR

# Builds and pushes the per-architecture add-on images that Home Assistant pulls.
# HA substitutes {arch} in config.yaml's `image:` key, so each architecture is its
# OWN single-arch image repo (amd64-addon-bar-assistant, aarch64-addon-bar-assistant)
# -- not a combined multi-arch manifest.
#
# Trigger: a pushed git tag matching the 5-part version, or a published Release.
#   git tag 5.15.4.15.0 && git push origin 5.15.4.15.0

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+.[0-9]+.[0-9]+"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (must equal config.yaml version)"
        required: true

env:
  REGISTRY: ghcr.io
  OWNER: dvvarf

jobs:
  guard:
    name: Version guard
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Version coupling guard
        run: bash scripts/check-version-sync.sh
      - name: Resolve and verify version
        id: v
        run: |
          set -euo pipefail
          cfg_ver="$(grep -E '^version:' bar-assistant/config.yaml | head -1 \
            | sed -E 's/^version:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/')"
          case "${{ github.event_name }}" in
            push)              ref_ver="${GITHUB_REF_NAME}" ;;
            release)           ref_ver="${GITHUB_REF_NAME#v}" ;;
            workflow_dispatch) ref_ver="${{ github.event.inputs.version }}" ;;
          esac
          echo "config.yaml=$cfg_ver  trigger=$ref_ver"
          if [ "$cfg_ver" != "$ref_ver" ]; then
            echo "::error::Trigger version ($ref_ver) != config.yaml version ($cfg_ver)"; exit 1
          fi
          echo "version=$cfg_ver" >> "$GITHUB_OUTPUT"

  publish:
    name: Build + push ${{ matrix.arch }}
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: ./bar-assistant
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.arch }}-addon-bar-assistant:${{ needs.guard.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.arch }}-addon-bar-assistant:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
